<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>个人感悟 - 留给时间一点空间</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        .placeholder-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            text-align: center;
            color: #555;
        }

        .placeholder-container h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #333;
        }

        .placeholder-container p {
            font-size: 1.2em;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .placeholder-container a {
            color: #007bff;
            text-decoration: none;
            margin-top: 30px;
            display: inline-block;
            border: 1px solid #007bff;
            padding: 10px 20px;
            border-radius: 5px;
        }

        .placeholder-container a:hover {
            background: #007bff;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="placeholder-container">
        <h1>个人感悟</h1>
        <p>这里将记录生活随笔、读书笔记与人生思考。<br>内容正在整理归档中，敬请期待！</p>
        <a href="/">返回首页</a>
    </div>
</body>

</html>
